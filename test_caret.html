<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  .container { position: relative; font-family: monospace; font-size: 16px; margin: 50px; }
  .fake { position: absolute; inset: 0; pointer-events: none; color: green; }
  .real { position: absolute; inset: 0; background: transparent; border: none; outline: none; resize: none; font-family: monospace; font-size: 16px; margin: 0; padding: 0; }
  
  /* Test 1: opacity 0 */
  .t1 { opacity: 0; }
  
  /* Test 2: transparent text & caret */
  .t2 { color: transparent; caret-color: transparent; }
</style>
</head>
<body>
  <div class="container">
    <div class="fake">fake text layer 1</div>
    <textarea class="real t1">fake text layer 1</textarea>
  </div>
  <div class="container" style="margin-top: 100px;">
    <div class="fake">fake text layer 2</div>
    <textarea class="real t2">fake text layer 2</textarea>
  </div>
</body>
</html>
